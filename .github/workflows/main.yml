name: Frontend Security Scan - SonarCloud, Snyk, Trivy, ECR

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  security-events: write
  actions: read

env:
  APP_DIR: frontend
  IMAGE_NAME: devops-frontend
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: devops/dso-project

jobs:
  frontend-security-scan:
    name: Scan Frontend, Build Image and Push to ECR
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ env.APP_DIR }}/package-lock.json

      - name: Install frontend dependencies
        working-directory: ${{ env.APP_DIR }}
        run: npm ci

      - name: Build frontend
        working-directory: ${{ env.APP_DIR }}
        run: npm run build

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v7
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Setup Snyk
        uses: snyk/actions/setup@master

      - name: Snyk Open Source Dependency Scan
        continue-on-error: true
        working-directory: ${{ env.APP_DIR }}
        run: snyk test --file=package.json --sarif-file-output=../snyk-open-source.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk Dependency Report
        if: always() && hashFiles('snyk-open-source.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-open-source.sarif
          category: snyk-open-source

      - name: Snyk Code Scan
        continue-on-error: true
        working-directory: ${{ env.APP_DIR }}
        run: snyk code test --sarif-file-output=../snyk-code.sarif
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload Snyk Code Report
        if: always() && hashFiles('snyk-code.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: snyk-code.sarif
          category: snyk-code

      - name: Trivy Filesystem Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: ${{ env.APP_DIR }}
          format: sarif
          output: trivy-fs.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy Filesystem Report
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Trivy Dockerfile Config Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: ${{ env.APP_DIR }}
          format: sarif
          output: trivy-config.sarif
          severity: HIGH,CRITICAL

      - name: Upload Trivy Config Report
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      - name: Build Docker image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG ./${{ env.APP_DIR }}

      - name: Trivy Docker Image Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: sarif
          output: trivy-image.sarif
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Upload Trivy Image Report
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::283372067875:oidc-provider/token.actions.githubusercontent.com
          aws-region: ${{ env.AWS_REGION }}

      - name: Check AWS identity
        run: aws sts get-caller-identity

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker tag $IMAGE_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $IMAGE_NAME:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest

          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

      - name: Upload all scan reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-security-reports
          path: |
            snyk-open-source.sarif
            snyk-code.sarif
            trivy-fs.sarif
            trivy-config.sarif
            trivy-image.sarif
